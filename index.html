<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>

<style>
  
  body {
      font-family: system-ui, sans-serif;
      background: #f5f4f0;
      padding: 2rem;
      max-width: 700px;
      margin: 0 auto;
    }
  
    h1 {
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
    }

    .summary {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat {
      flex: 1;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1rem;
    }

    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: #888;
      margin-top: 0.75rem;
    }

    input, select {
      width: 100%;
      box-sizing: border-box;
      padding: 0.5rem;
      margin-top: 0.25rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    button {
      display: block;
      margin-top: 1rem;
      padding: 0.6rem 1.2rem;
      background: #4a7c59;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    ul {
  padding: 0;
  margin: 0;
  list-style: none;
}

li {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.5rem 0;
  border-bottom: 1px solid #eee;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.5rem 0;
  border-bottom: 1px solid #eee;
  line-height: 1;
}

li button {
  background: #e57373;
  color: white;
  border: none;
  border-radius: 6px;
  padding: 0.3rem 0.75rem;
  cursor: pointer;
  font-size: 0.8rem;
  margin-top:0;
}


</style>

</head>
<body>

 <h1>Expense Tracker</h1>

<img src="1706862308580.jpg" alt="Expense Tracker" style="width:100%; border-radius:10px; margin-bottom:1.5rem;" />

  <!-- Chat interface -->
  <div class="card">
    <h2>Ask Claude</h2>
    <p style="color:#888; font-size:0.85rem; margin:0 0 1rem 0;">
      e.g. "Add a €12 lunch expense from today" or "Delete the bus ticket expense"
    </p>
    <div style="display:flex; gap:0.5rem;">
      <input id="chat-input" type="text" placeholder="Type a message..." 
        style="flex:1; max-width:none;" onkeydown="if(event.key==='Enter') sendChat()" />
      <button onclick="sendChat()" style="margin-top:0;">Send</button>
    </div>
    <div id="chat-reply" style="margin-top:1rem; font-size:0.9rem; color:#444;"></div>
  </div>

 <!-- Summary bar-->

<div class="summary">
  <div class="stat">
    <p>Total Spent</p>
    <p id="stat-total">€0.00</p>
  </div>
  <div class="stat">
    <p>Expenses</p>
    <p id="stat-count">€0.00</p>
  </div>
  <div class="stat">
    <p>Biggest Expense</p>
    <p id="stat-max">€0.00</p>
  </div>
</div>

<!-- Add expense form-->

<div class="card">
  <h2>Add Expenses Manually</h2>
  
  <label for="desc">Description</label>
  <input id="desc" type="text" placeholder="e.g. Groceries" />

  <label for="amount">Amount (€)</label>
  <input id="amount" type="number" placeholder="0.00" />

  <label for="category">Category </label>
  <select id="category">
      <option value="Food">Food</option>
      <option value="Transport">Transport</option>
      <option value="Housing">Housing</option>
      <option value="Health">Health</option>
      <option value="Entertainment">Entertainment</option>
      <option value="Shopping">Shopping</option>
      <option value="Other">Other</option>
  </select>

  <label for="date">Date</label>
  <input id="date" type="date" />

  <button onclick="addExpense()">Add Expense</button>

</div>

  <div class="card">
    <h2>Expenses</h2>
    <ul id="expense-list">

  <p id="empty-message" style="color:#888; font-size:0.85rem; margin:0; padding:0;">
    No expenses yet. Add one above — e.g. "Groceries, €45.50, Food"
  </p>

    </ul>
  </div>

     <script>

      // Fetches all expenses from the server and display them in the list
function loadExpenses() {
  fetch('/expenses')
  .then(function(response){
    return response.json();
  })
.then(function(expenses) {
  const list = document.getElementById('expense-list');
  const emptyMessage = document.getElementById('empty-message');

    if (expenses.length === 0) {
    list.innerHTML = '<p style="color:#888; font-size:0.85rem; margin:0; padding:0;">No expenses yet. Add one above — e.g. "Groceries, €45.50, Food"</p>';
    document.getElementById('stat-total').textContent = '€0.00';
    document.getElementById('stat-count').textContent = '0';
    document.getElementById('stat-max').textContent = '€0.00';
    return;
  }

if (emptyMessage) emptyMessage.style.display = 'none';

      list.innerHTML = '';

      expenses.forEach(function(expense) {
        const item = document.createElement('li');
item.innerHTML = expense.desc + ' — €' + expense.amount +
  ' <button onclick="deleteExpense(' + expense.id + ')">Delete</button>';
list.appendChild(item);

      // Calculate and display summary stats
      const total = expenses.reduce(function(sum, e) { return sum + e.amount; }, 0);
      const max   = Math.max.apply(null, expenses.map(function(e) { return e.amount; }));

      document.getElementById('stat-total').textContent = '€' + total.toFixed(2);
      document.getElementById('stat-count').textContent = expenses.length;
      document.getElementById('stat-max').textContent   = '€' + max.toFixed(2);

      });
    });
}

// Run loadExpenses as soon as the page loads
loadExpenses();
document.getElementById('date').value = new Date().toISOString().slice(0, 10);

// Sends a new expense to the server when the form is submitted
function addExpense() {
  const desc     = document.getElementById('desc').value;
  const amount   = parseFloat(document.getElementById('amount').value);
  const cat      = document.getElementById('category').value;
  const date     = document.getElementById('date').value;

  if (!desc || !amount || !date) {
    alert('Please fill in all fields.');
    return;
  }

  fetch('/expenses', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ desc, amount, cat, date })
  })
  .then(function(response) {
    return response.json();
  })
  .then(function() {
    document.getElementById('desc').value = '';
    document.getElementById('amount').value = '';
    loadExpenses();
  });
}

// Sends a delete request to the server for the given expense id
function deleteExpense(id) {
  fetch('/expenses/' + id, {
    method: 'DELETE'
  })
  .then(function() {
    loadExpenses();
  });
}

// Sends the user's message to the server which forwards it to Claude
function sendChat() {
  const input = document.getElementById('chat-input');
  const reply = document.getElementById('chat-reply');
  const message = input.value.trim();

  if (!message) return;

  reply.textContent = 'Thinking...';
  input.value = '';

  fetch('/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message })
  })
  .then(function(response) { return response.json(); })
  .then(function(data) {
    reply.textContent = data.reply;
    loadExpenses();
  });
}

    </script>

</body>
</html>
